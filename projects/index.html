<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Projects</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f1ea;
      --paper: #fbf8f2;
      --ink: #1c1815;
      --muted: #76695b;
      --hairline: #e3dccf;
      --hairline-strong: #d4c9b6;
      --rust: #b54a1e;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: "Fraunces", Georgia, serif;
      font-variation-settings: "opsz" 14;
      font-size: 16px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    a { color: inherit; }
    code { font-family: "JetBrains Mono", monospace; font-size: 0.88em; }

    .wrap {
      max-width: 1040px;
      margin: 0 auto;
      padding: 0 32px;
    }

    header {
      padding: 26px 0;
      border-bottom: 1px solid var(--hairline);
    }
    header .wrap {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .brand {
      font-family: "Fraunces", Georgia, serif;
      font-variation-settings: "opsz" 144, "wght" 500;
      font-size: 19px;
      letter-spacing: -0.02em;
      text-decoration: none;
      color: var(--ink);
    }
    .brand em {
      font-style: italic;
      font-variation-settings: "opsz" 144, "wght" 400;
      color: var(--muted);
      margin-left: 6px;
    }
    nav {
      font-family: "JetBrains Mono", monospace;
      font-size: 11.5px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    nav a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s ease;
    }
    nav a + a { margin-left: 28px; }
    nav a:hover { color: var(--rust); }
    nav a[aria-current] { color: var(--ink); }

    .hero { padding: 128px 0 96px; }
    .hero .lede {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin: 0 0 32px;
    }
    .hero h1 {
      font-family: "Fraunces", Georgia, serif;
      font-variation-settings: "opsz" 144, "wght" 380;
      font-size: clamp(36px, 5.4vw, 60px);
      line-height: 1.05;
      letter-spacing: -0.025em;
      margin: 0 0 20px;
      max-width: 820px;
    }
    .hero p:last-child {
      max-width: 620px;
      margin: 0;
      color: var(--muted);
      font-size: 18px;
    }

    .section {
      padding: 56px 0 128px;
      border-top: 1px solid var(--hairline);
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 36px;
    }
    .section-head h2 {
      font-family: "JetBrains Mono", monospace;
      font-size: 11.5px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-weight: 500;
      margin: 0;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 28px;
    }
    .card {
      background: var(--paper);
      border: 1px solid var(--hairline);
      border-radius: 4px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      position: relative;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 36px -12px rgba(28,24,21,0.18);
      border-color: var(--hairline-strong);
    }
    .card .thumb {
      aspect-ratio: 16 / 10;
      border-bottom: 1px solid var(--hairline);
      position: relative;
      overflow: hidden;
    }
    .card .index {
      position: absolute;
      top: 12px;
      left: 14px;
      font-family: "JetBrains Mono", monospace;
      font-size: 10.5px;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.85);
      mix-blend-mode: difference;
    }
    .card .body {
      padding: 18px 20px 20px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }
    .card .title {
      font-family: "Fraunces", Georgia, serif;
      font-variation-settings: "opsz" 60, "wght" 500;
      font-size: 19px;
      line-height: 1.25;
      letter-spacing: -0.012em;
      margin: 0 0 6px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
    }
    .card .title .arrow {
      font-family: "JetBrains Mono", monospace;
      font-size: 14px;
      color: var(--muted);
      opacity: 0;
      transform: translateX(-4px);
      transition: opacity 0.2s ease, transform 0.2s ease, color 0.2s ease;
    }
    .card:hover .title .arrow {
      opacity: 1;
      transform: translateX(0);
      color: var(--rust);
    }
    .card .desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
      margin: 0 0 16px;
      flex-grow: 1;
    }
    .card .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
    .status { display: inline-flex; align-items: center; gap: 7px; }
    .status::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    .status.live::before { background: #5b8c5a; }
    .thumb-1 { background: linear-gradient(135deg, #c8b9a0 0%, #b54a1e 100%); }

    footer {
      padding: 36px 0 56px;
      border-top: 1px solid var(--hairline);
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
    footer .wrap {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }
    footer .links a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s ease;
    }
    footer .links a + a { margin-left: 24px; }
    footer .links a:hover { color: var(--rust); }

    @media (max-width: 600px) {
      .wrap { padding: 0 20px; }
      .hero { padding: 72px 0 56px; }
      .grid { gap: 20px; }
      .section { padding: 44px 0 80px; }
      nav a + a { margin-left: 16px; }
      footer .links a + a { margin-left: 16px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <a class="brand" href="../index.html"><em>index</em></a>
      <nav aria-label="Site navigation">
        <a href="../index.html">Home</a>
        <a href="./index.html" aria-current="page">Projects</a>
        <a href="../about.html">About</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="wrap">
        <p class="lede">No. 02 / Archive</p>
        <h1>Projects.</h1>
      </div>
    </section>

    <section class="section">
      <div class="wrap">
        <div class="section-head">
          <h2>All projects</h2>
        </div>
        <div class="grid">
          <a class="card" href="./pm_automation_maturity.html">
            <div class="thumb thumb-1"><span class="index">01</span></div>
            <div class="body">
              <h3 class="title"><span>PM Automation Maturity</span><span class="arrow">→</span></h3>
              <p class="desc">A maturity model for automation in product management workflows.</p>
              <div class="meta">
                <span class="status live">Live</span>
                <span>Apr 2026</span>
              </div>
            </div>
          </a>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="wrap">
      <span>© 2026</span>
      <div class="links">
        <a href="https://github.com/kei02003">GitHub</a>
        <a href="../about.html">About</a>
      </div>
    </div>
  </footer>
</body>
</html>
