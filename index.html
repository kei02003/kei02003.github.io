<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>kei02003.github.io</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      color: #1a1a1a;
      background: #fff;
    }
    .page {
      max-width: 760px;
      margin: 0 auto;
      padding: 56px 24px 72px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
    }
    p {
      margin: 0 0 24px;
      color: #444;
    }
    nav {
      display: grid;
      gap: 12px;
    }
    .nav-link {
      display: block;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 14px 16px;
      text-decoration: none;
      color: #1a1a1a;
      background: #f7f7f7;
      font-weight: 600;
    }
    .nav-link:hover {
      border-color: #2d7a3a;
      background: #e8f5eb;
    }
    .path {
      display: block;
      margin-top: 2px;
      color: #666;
      font-size: 0.9rem;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>Site Navigation</h1>
    <p>Choose a page:</p>
    <nav aria-label="Primary navigation">
      <a class="nav-link" href="/about.html">
        About
        <span class="path">/about.html</span>
      </a>
      <a class="nav-link" href="/projects/">
        Projects
        <span class="path">/projects/</span>
      </a>
    </nav>
  </main>
</body>
</html>
